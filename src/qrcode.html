---
layout: "primary.liquid"
title: "Camera"
---

<div class="max-w-2xl">
  <h3 class="text-lg font-semibold text-gray-900 mb-2">Camera Test</h3>
  <p class="text-sm text-gray-600 mb-6">Verify that the browser can access the device camera. Click Start to request camera access and stream video.</p>

  <div class="rounded-lg border border-gray-200 overflow-hidden">
    <video id="video" class="w-full bg-gray-900" height="480" autoplay></video>
    <div class="flex items-center gap-3 px-4 py-3 bg-gray-50">
      <button onclick="startCamera()" class="rounded border border-gray-300 bg-white px-4 py-1.5 text-xs font-semibold text-gray-700 hover:bg-gray-100">Start</button>
      <button onclick="stopCamera()" class="rounded border border-gray-300 bg-white px-4 py-1.5 text-xs font-semibold text-gray-700 hover:bg-gray-100">Stop</button>
      <span id="camera-status" class="text-xs text-gray-400"></span>
    </div>
  </div>
</div>

<script>

function startCamera() {
  let video = document.getElementById('video');
  let status = document.getElementById('camera-status');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    status.textContent = 'Camera API not supported on this device.';
    status.classList.add('text-red-500');
    return;
  }

  status.textContent = 'Requesting camera access...';
  status.classList.remove('text-red-500', 'text-green-600');
  status.classList.add('text-gray-400');

  navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    .then((stream) => {
      video.srcObject = stream;
      status.textContent = 'Camera active';
      status.classList.remove('text-gray-400');
      status.classList.add('text-green-600');
    })
    .catch((err) => {
      status.textContent = 'Error: ' + err.message;
      status.classList.remove('text-gray-400');
      status.classList.add('text-red-500');
    });
}

function stopCamera() {
  let video = document.getElementById('video');
  let status = document.getElementById('camera-status');

  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.stop());
    video.srcObject = null;
    status.textContent = 'Camera stopped';
    status.classList.remove('text-green-600', 'text-red-500');
    status.classList.add('text-gray-400');
  }
}

</script>
