---
layout: "primary.liquid"
title: "Microphone Capture"
---

<div class="flex flex-col rounded-md items-center bg-gray-100 p-6 border border-gray-600">
 
    <h1>Audio Recorder</h1>
  
  <div id="status">Ready to record</div>
  
  <button id="startBtn">Start Recording</button>
  <button id="stopBtn" disabled>Stop Recording</button>
  
  <audio id="audioPlayback" controls style="display: none;"></audio>
  



</div>


  <script>
    let mediaRecorder;
    let audioChunks = [];
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const audioPlayback = document.getElementById('audioPlayback');
    
    startBtn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (event) => {
          audioChunks.push(event.data);
        };
        
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const audioUrl = URL.createObjectURL(audioBlob);
          audioPlayback.src = audioUrl;
          audioPlayback.style.display = 'block';
          status.textContent = 'Recording complete! Play it back below.';
          
          // Stop all tracks to release microphone
          stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        
        startBtn.disabled = true;
        stopBtn.disabled = false;
        startBtn.classList.remove('recording');
        stopBtn.classList.add('recording');
        status.textContent = '🔴 Recording...';
        
      } catch (err) {
        status.textContent = 'Error: Could not access microphone - ' + err.message;
        console.error('Error accessing microphone:', err);
      }
    });
    
    stopBtn.addEventListener('click', () => {
      mediaRecorder.stop();
      
      startBtn.disabled = false;
      stopBtn.disabled = true;
      stopBtn.classList.remove('recording');
    });
  </script>
