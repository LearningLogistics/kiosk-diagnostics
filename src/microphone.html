---
layout: "primary.liquid"
title: "Microphone"
---

<div class="max-w-2xl">
  <h3 class="text-lg font-semibold text-gray-900 mb-2">Microphone Test</h3>
  <p class="text-sm text-gray-600 mb-6">Verify that the browser can access the device microphone. Record a short clip and play it back.</p>

  <div class="rounded-lg border border-gray-200 overflow-hidden">
    <div class="px-4 py-4">
      <div class="flex items-center gap-3 mb-4">
        <button id="startBtn" onclick="startRecording()" class="rounded border border-gray-300 bg-white px-4 py-1.5 text-xs font-semibold text-gray-700 hover:bg-gray-100">Record</button>
        <button id="stopBtn" onclick="stopRecording()" disabled class="rounded border border-gray-300 bg-white px-4 py-1.5 text-xs font-semibold text-gray-700 hover:bg-gray-100 opacity-50">Stop</button>
        <span id="mic-status" class="text-xs text-gray-400">Ready</span>
      </div>
      <audio id="audioPlayback" controls class="hidden w-full"></audio>
    </div>
  </div>
</div>

<script>

let mediaRecorder;
let audioChunks = [];

function startRecording() {
  let startBtn = document.getElementById('startBtn');
  let stopBtn = document.getElementById('stopBtn');
  let status = document.getElementById('mic-status');
  let playback = document.getElementById('audioPlayback');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    status.textContent = 'Microphone API not supported on this device.';
    status.classList.add('text-red-500');
    return;
  }

  status.textContent = 'Requesting microphone access...';
  status.classList.remove('text-red-500', 'text-green-600');
  status.classList.add('text-gray-400');

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then((stream) => {
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = (event) => {
        audioChunks.push(event.data);
      };

      mediaRecorder.onstop = () => {
        let audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        playback.src = URL.createObjectURL(audioBlob);
        playback.classList.remove('hidden');
        status.textContent = 'Recording complete. Play it back below.';
        status.classList.remove('text-red-500');
        status.classList.add('text-green-600');
        stream.getTracks().forEach(track => track.stop());
      };

      mediaRecorder.start();
      startBtn.disabled = true;
      startBtn.classList.add('opacity-50');
      stopBtn.disabled = false;
      stopBtn.classList.remove('opacity-50');
      status.textContent = 'Recording...';
      status.classList.remove('text-gray-400');
      status.classList.add('text-red-500');
    })
    .catch((err) => {
      status.textContent = 'Error: ' + err.message;
      status.classList.remove('text-gray-400');
      status.classList.add('text-red-500');
    });
}

function stopRecording() {
  let startBtn = document.getElementById('startBtn');
  let stopBtn = document.getElementById('stopBtn');

  mediaRecorder.stop();
  startBtn.disabled = false;
  startBtn.classList.remove('opacity-50');
  stopBtn.disabled = true;
  stopBtn.classList.add('opacity-50');
}

</script>
