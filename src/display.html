---
layout: "primary.liquid"
title: "Display Test"
---
   
<div class="container">
    <p class="max-w-2xl">Use this page to ensure the browser is showing the full page. You should see a red border around the whole page.</p>
    <span class="absolute bottom-[10px] right-[10px] bg-gray-900 text-white py-2 px-4">Width: 1032px | Height: 1300px</span>
</div>


<style>
    body {
        border: 3px solid red;
        /*min-height: 100vh;*/
    }
    html, body, .container {
        height: 100%;
    }

</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        updateDimensions();
    });
    window.addEventListener('resize', () => {
        updateDimensions();
    });

    function updateDimensions() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const span = document.querySelector('.container span');
        span.textContent = `Width: ${width}px | Height: ${height}px`;
    }
</script>
