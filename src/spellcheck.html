---
layout: "primary.liquid"
title: "Spellcheck"
---

<div class="max-w-2xl">
  <h3 class="text-lg font-semibold text-gray-900 mb-2">Spellcheck Attribute Test</h3>
  <p class="text-sm text-gray-600 mb-6">Type misspelled words in each text area below to see how the platform handles the <code class="text-sm bg-gray-100 px-1 rounded">spellcheck</code> attribute.</p>

  <div class="space-y-6">

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="text-sm font-semibold text-gray-900">spellcheck="true"</label>
        <span class="text-xs text-gray-400">Spellcheck should be enabled</span>
      </div>
      <textarea spellcheck="true" rows="4" placeholder="Type a misspelled word here, e.g. 'teh' or 'speling'" class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
    </div>

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="text-sm font-semibold text-gray-900">spellcheck="false"</label>
        <span class="text-xs text-gray-400">Spellcheck should be disabled</span>
      </div>
      <textarea spellcheck="false" rows="4" placeholder="Type a misspelled word here, e.g. 'teh' or 'speling'" class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
    </div>

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="text-sm font-semibold text-gray-900">No spellcheck attribute</label>
        <span class="text-xs text-gray-400">Platform default behavior</span>
      </div>
      <textarea rows="4" placeholder="Type a misspelled word here, e.g. 'teh' or 'speling'" class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
    </div>

  </div>
</div>
