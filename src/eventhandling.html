---
layout: "primary.liquid"
title: "Event handling tests"
---

<div class="container mx-auto p-4">
  <h2 class="text-2xl font-bold mb-6">Event Handler Test Page</h2>

  <!-- Event Controls Section -->
  <div class="mb-8">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      
      <div class="border p-4 rounded">
        <div class="flex justify-between items-center mb-2">
          <h4 class="font-semibold">Breach Event</h4>
          <span class="text-2xl font-bold text-red-600" id="breach-count">0</span>
        </div>
        <label class="flex items-center space-x-2 mb-2">
          <input type="checkbox" id="breach-prevent" class="form-checkbox">
          <span>Prevent Default</span>
        </label>
        <button onclick="triggerEvent('breach')" class="px-3 py-1 bg-red-500 text-white rounded text-sm">
          Trigger
        </button>
      </div>

      <div class="border p-4 rounded">
        <div class="flex justify-between items-center mb-2">
          <h4 class="font-semibold">Display Added Event</h4>
          <span class="text-2xl font-bold text-blue-600" id="display-added-count">0</span>
        </div>
        <label class="flex items-center space-x-2 mb-2">
          <input type="checkbox" id="display-added-prevent" class="form-checkbox">
          <span>Prevent Default</span>
        </label>
        <button onclick="triggerEvent('display-added')" class="px-3 py-1 bg-blue-500 text-white rounded text-sm">
          Trigger
        </button>
      </div>

      <div class="border p-4 rounded">
        <div class="flex justify-between items-center mb-2">
          <h4 class="font-semibold">Lost Focus Event</h4>
          <span class="text-2xl font-bold text-yellow-600" id="lost-focus-count">0</span>
        </div>
        <label class="flex items-center space-x-2 mb-2">
          <input type="checkbox" id="lost-focus-prevent" class="form-checkbox">
          <span>Prevent Default</span>
        </label>
        <button onclick="triggerEvent('lost-focus')" class="px-3 py-1 bg-yellow-500 text-white rounded text-sm">
          Trigger
        </button>
      </div>

      <div class="border p-4 rounded">
        <div class="flex justify-between items-center mb-2">
          <h4 class="font-semibold">Offline Event</h4>
          <span class="text-2xl font-bold text-gray-600" id="offline-count">0</span>
        </div>
        <label class="flex items-center space-x-2 mb-2">
          <input type="checkbox" id="offline-prevent" class="form-checkbox">
          <span>Prevent Default</span>
        </label>
        <button onclick="triggerEvent('offline')" class="px-3 py-1 bg-gray-500 text-white rounded text-sm">
          Trigger
        </button>
      </div>

      <div class="border p-4 rounded">
        <div class="flex justify-between items-center mb-2">
          <h4 class="font-semibold">Online Event</h4>
          <span class="text-2xl font-bold text-green-600" id="online-count">0</span>
        </div>
        <label class="flex items-center space-x-2 mb-2">
          <input type="checkbox" id="online-prevent" class="form-checkbox">
          <span>Prevent Default</span>
        </label>
        <button onclick="triggerEvent('online')" class="px-3 py-1 bg-green-500 text-white rounded text-sm">
          Trigger
        </button>
      </div>

    </div>
  </div>

  <!-- Event Log Section -->
  <div class="mb-8">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold">Events Fired</h3>
      <button onclick="clearEventLog()" class="px-3 py-1 bg-gray-400 text-white rounded text-sm">
        Clear Log
      </button>
    </div>
    <div class="border rounded p-4 bg-gray-50 max-h-96 overflow-y-auto">
      <ol id="eventlist" class="space-y-2">
        <!-- Events will be added here -->
      </ol>
    </div>
  </div>
</div>

<script>
// Event tracking
const eventLog = [];
const eventCounts = {
  'breach': 0,
  'display-added': 0,
  'lost-focus': 0,
  'offline': 0,
  'online': 0
};

// Event handler factory
function createEventHandler(eventType) {
  return function(ev) {
    const timestamp = new Date().toISOString();
    const eventData = {
      type: eventType,
      timestamp: timestamp,
      details: ev.detail || {},
      preventDefault: document.getElementById(`${eventType}-prevent`).checked
    };

    // Add to event log
    eventLog.push(eventData);
    
    // Update statistics
    eventCounts[eventType]++;
    updateStatistics();
    console.log("HERE")
    // Add to visual log
    addEventToLog(eventData);
    
    // Check if we should prevent default
    if (eventData.preventDefault) {
      console.log(`Preventing default for ${eventType} event`);
      ev.preventDefault();
    }
    
  };
}

// Add event to visual log
function addEventToLog(eventData) {
  const li = document.createElement('li');
  li.className = 'p-2 border rounded bg-white';
  
  const preventText = eventData.preventDefault ? 
    '<span class="bg-yellow-200 text-yellow-800 px-2 py-1 rounded text-xs ml-2">PREVENTED</span>' : '';
  
  li.innerHTML = `
    <div class="flex justify-between items-start">
      <div>
        <strong>${eventData.type}</strong>
        ${preventText}
        <div class="text-sm text-gray-600 mt-1">
          ${new Date(eventData.timestamp).toLocaleTimeString()}
        </div>
      </div>
      <div class="text-xs text-gray-500">
        ${Object.keys(eventData.details).length > 0 ? 
          `<pre class="text-xs">${JSON.stringify(eventData.details, null, 2)}</pre>` : 
          'No details'
        }
      </div>
    </div>
  `;
  
  const eventList = document.getElementById('eventlist');
  eventList.insertBefore(li, eventList.firstChild); // Add to top
}

// Update statistics display
function updateStatistics() {
  Object.keys(eventCounts).forEach(eventType => {
    const element = document.getElementById(`${eventType}-count`);
    if (element) {
      element.textContent = eventCounts[eventType];
    }
  });
}

// Clear event log
function clearEventLog() {
  eventLog.length = 0;
  document.getElementById('eventlist').innerHTML = '';
  
  // Reset statistics
  Object.keys(eventCounts).forEach(key => {
    eventCounts[key] = 0;
  });
  updateStatistics();
  
  console.log('Event log cleared');
}

// Trigger test events (for testing without actual events)
function triggerEvent(eventType) {
    window.kiosked.diagnostics.fireEvent(eventType);
}

// Initialize event handlers
window.eventHandlers = {};
const eventTypes = ['breach', 'display-added', 'lost-focus', 'offline', 'online'];

// Register event handlers on page load
document.addEventListener('DOMContentLoaded', function() {
  eventTypes.forEach(eventType => {
    const handler = createEventHandler(eventType);
    window.eventHandlers[eventType] = handler;
    
    if (window.kiosked && typeof window.kiosked.addEventListener === 'function') {
      window.kiosked.addEventListener(eventType, handler);
      console.log(`Registered handler for ${eventType}`);
    } else {
      console.warn(`Could not register handler for ${eventType} - kiosked not available`);
    }
  });
  
  console.log('Event handler test page initialized');
});

</script>

<style>
/* Custom styles for form elements if needed */
.form-checkbox {
  @apply h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded;
}

/* Scrollbar styling for event log */
#eventlist::-webkit-scrollbar {
  width: 6px;
}

#eventlist::-webkit-scrollbar-track {
  background: #f1f1f1;
}

#eventlist::-webkit-scrollbar-thumb {
  background: #888;
  border-radius: 3px;
}

#eventlist::-webkit-scrollbar-thumb:hover {
  background: #555;
}
</style>
